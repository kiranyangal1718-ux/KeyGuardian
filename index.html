<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield Check | Professional Entropy Scanner</title>
    <style>
        body {
            margin: 0;
            background: #0b1424;
            font-family: 'Courier New', monospace;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: #111c33;
            padding: 40px;
            border-radius: 25px;
            width: 420px;
            border: 1px solid #1e2a3a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { color: #40cfff; letter-spacing: 2px; margin-bottom: 5px; margin-top: 0; }
        .subtitle { color: #9aa6b2; margin-bottom: 30px; font-size: 14px; }

        .password-box input {
            width: 100%;
            padding: 15px;
            background: #061225;
            border: 2px solid #00e5ff;
            border-radius: 12px;
            color: #00e5ff;
            font-size: 18px;
            outline: none;
            text-align: center;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }

        /* CIRCLE SECTION */
        .circle-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 40px auto;
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 12;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .progress-bg { stroke: #1e2a3a; }

        .progress-bar {
            stroke: #00ffd5;
            stroke-linecap: round;
            stroke-dasharray: 502.6;
            stroke-dashoffset: 502.6;
            transition: stroke-dashoffset 0.5s ease, stroke 0.5s ease;
        }

        .percent-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #percentText { font-size: 32px; font-weight: bold; display: block; }
        .bits-label { font-size: 10px; color: #8a94a3; text-transform: uppercase; }

        .boxes {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .box {
            background: #0b1424;
            padding: 15px;
            border-radius: 12px;
            width: 46%;
            border: 1px solid #1e2a3a;
        }

        .box p { margin: 0; font-size: 10px; color: #8a94a3; margin-bottom: 8px; }
        .box h2 { margin: 0; font-size: 16px; color: #40cfff; }

        #statusBadge {
            margin-top: 25px;
            background: #1e2a3a;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        .footer { margin-top: 25px; font-size: 11px; color: #5c6775; }
    </style>
</head>
<body>

<div class="container">
    <h1>KeyGuardian</h1>
    <p class="subtitle">Secure your data not the apps</p>

    <div class="password-box">
        <input type="text" id="passwordInput" placeholder="Enter password" autocomplete="off">
    </div>

    <div class="circle-wrapper">
        <svg width="180" height="180">
            <circle class="progress-bg" cx="90" cy="90" r="80"></circle>
            <circle id="progressCircle" class="progress-bar" cx="90" cy="90" r="80"></circle>
        </svg>
        <div class="percent-box">
            <span id="percentText">0%</span>
            <span class="bits-label">Security</span>
        </div>
    </div>

    <div class="boxes">
        <div class="box">
            <p>ENTROPY BITS</p>
            <h2 id="entropy">0.00</h2>
        </div>
        <div class="box">
            <p>CRACK TIME</p>
            <h2 id="crack">Instant</h2>
        </div>
    </div>

    <div id="statusBadge">WAITING...</div>

    <p class="footer">🔒 Data stays local. 100% Client-Side Encryption.</p>
</div>

<script>
    const input = document.getElementById("passwordInput");
    const circle = document.getElementById("progressCircle");
    const percentText = document.getElementById("percentText");
    const entropyText = document.getElementById("entropy");
    const crackText = document.getElementById("crack");
    const badge = document.getElementById("statusBadge");

    const circumference = 2 * Math.PI * 80;

    input.addEventListener("input", () => {
        const val = input.value;
        if (!val) {
            reset();
            return;
        }

        // 1. Calculate Pool Size
        let pool = 0;
        if (/[a-z]/.test(val)) pool += 26;
        if (/[A-Z]/.test(val)) pool += 26;
        if (/[0-9]/.test(val)) pool += 10;
        if (/[^a-zA-Z0-9]/.test(val)) pool += 32;

        // 2. Entropy Math
        const entropy = val.length * Math.log2(pool);
        entropyText.innerText = entropy.toFixed(2);

        // 3. Circle & Percentage (Goal: 100 bits)
        let strength = Math.min((entropy / 100) * 100, 100);
        const offset = circumference - (strength / 100) * circumference;
        circle.style.strokeDashoffset = offset;
        percentText.innerText = Math.floor(strength) + "%";

        // 4. Update UI Colors
        if (entropy < 45) {
            circle.style.stroke = "#ff4d4d";
            badge.innerText = "WEAK";
            badge.style.background = "#4d1a1a";
            crackText.style.color = "#ff4d4d";
        } else if (entropy < 75) {
            circle.style.stroke = "#ffcc00";
            badge.innerText = "SECURE";
            badge.style.background = "#4d4000";
            crackText.style.color = "#ffcc00";
        } else {
            circle.style.stroke = "#00ffd5";
            badge.innerText = "GOD-TIER";
            badge.style.background = "#1b8f6b";
            crackText.style.color = "#00ffd5";
        }

        // 5. Precise Crack Time Logic
        const seconds = Math.pow(2, entropy) / 1e10; // Approx 10B guesses/sec
        
        if (seconds < 1) {
            crackText.innerText = "Instant";
        } else if (seconds < 60) {
            crackText.innerText = Math.floor(seconds) + " seconds";
        } else if (seconds < 3600) {
            crackText.innerText = Math.floor(seconds / 60) + " minutes";
        } else if (seconds < 86400) {
            crackText.innerText = Math.floor(seconds / 3600) + " hours";
        } else if (seconds < 31536000) {
            crackText.innerText = Math.floor(seconds / 86400) + " days";
        } else if (seconds < 3153600000) {
            crackText.innerText = Math.floor(seconds / 31536000) + " years";
        } else {
            const centuries = Math.floor(seconds / 3153600000);
            crackText.innerText = centuries + " centuries";
        }
    });

    function reset() {
        circle.style.strokeDashoffset = circumference;
        percentText.innerText = "0%";
        entropyText.innerText = "0.00";
        crackText.innerText = "Instant";
        crackText.style.color = "#40cfff";
        badge.innerText = "AWAITING...";
        badge.style.background = "#1e2a3a";
    }
</script>

</body>
</html>
